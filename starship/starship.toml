format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$line_break\
$python\
$character"""

[directory]
style = "#d1a963"

[character]
success_symbol = "[❯](#afaf69)"
error_symbol = "[❯](#c86663)"
vimcmd_symbol = "[❮](#a98988)"

[git_branch]
format = "[$branch](#afaf69)"

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](#c86663) ($ahead_behind$stashed)](#282828)"
style = "blue"
conflicted = "​"
untracked = "​"
modified = "​"
staged = "​"
renamed = "​"
deleted = "​"
stashed = "≡"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[cmd_duration]
format = "[$duration]($style) "
style = "$style"

[python]
format = "[$virtualenv]($style) "
style = "bright-black"
